name: on_the_way
description: On The Way is your trusted roadside assistance app, built to get you back on the road fast. Whether you&#x27;re stranded with a flat tire, a dead battery, or an empty tank — help is just a tap away.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^2.9.1+2
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_hooks: ^0.21.3+1
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1

  # Backend – Firebase

  # Backend – Supabase

  # Backend – Appwrite
  appwrite: ^23.1.0

  # Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons
  iconsax_plus: ^1.0.0

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media
  image_picker: ^1.2.1
  file_picker: ^11.0.2

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0

  # Device & System
  device_info_plus: ^12.4.0
  app_version_update: ^6.2.0


  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.12.2
  hive_ce_generator: ^1.11.1

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: false
  android_12:
    image: assets/images/splash.png
    color: "#ffffff"
    icon_background_color: "#ffffff"

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoFlex
      fonts:
        - asset: assets/fonts/RobotoFlex-VariableFont.ttf
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/fonts/
    - .env

